<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="420" viewBox="0 0 1180 420" role="img" aria-labelledby="title desc">
<title>DM에서 승인된 세션까지</title><desc>흩어진 DM → 요청 카드 → 호스트 판단 → 승인된 세션</desc>
<rect width="100%" height="100%" rx="34" fill="#FBF7EF"/>
<rect x="32" y="32" width="1116" height="356" rx="28" fill="#fff" stroke="#E4D8C7"/>
<text x="70" y="86" font-family="Pretendard, Apple SD Gothic Neo, sans-serif" font-size="30" font-weight="800" fill="#14213D">DM에서 승인된 세션까지</text>
<text x="70" y="122" font-family="Pretendard, Apple SD Gothic Neo, sans-serif" font-size="16" fill="#526173">문제를 기능이 아니라 흐름으로 나눈 구조</text>
<rect x="90" y="168" width="190" height="88" rx="22" fill="#EDF2E8" stroke="#D8C7AF"/>
<circle cx="124" cy="212" r="18" fill="#4F6F5A"/><text x="124" y="219" font-family="Pretendard, Apple SD Gothic Neo, sans-serif" font-size="18" text-anchor="middle" font-weight="800" fill="#fff">1</text>
<text x="155" y="218" font-family="Pretendard, Apple SD Gothic Neo, sans-serif" font-size="22" font-weight="800" fill="#111827">흩어진 DM</text>
<path d="M 298 212 L 312 212" stroke="#9CAF88" stroke-width="5" stroke-linecap="round"/>
<path d="M 298 200 L 312 212 L 298 224" fill="none" stroke="#9CAF88" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
<rect x="340" y="168" width="190" height="88" rx="22" fill="#FFF8ED" stroke="#D8C7AF"/>
<circle cx="374" cy="212" r="18" fill="#4F6F5A"/><text x="374" y="219" font-family="Pretendard, Apple SD Gothic Neo, sans-serif" font-size="18" text-anchor="middle" font-weight="800" fill="#fff">2</text>
<text x="405" y="218" font-family="Pretendard, Apple SD Gothic Neo, sans-serif" font-size="22" font-weight="800" fill="#111827">요청 카드</text>
<path d="M 548 212 L 562 212" stroke="#9CAF88" stroke-width="5" stroke-linecap="round"/>
<path d="M 548 200 L 562 212 L 548 224" fill="none" stroke="#9CAF88" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
<rect x="590" y="168" width="190" height="88" rx="22" fill="#EAF1F8" stroke="#D8C7AF"/>
<circle cx="624" cy="212" r="18" fill="#4F6F5A"/><text x="624" y="219" font-family="Pretendard, Apple SD Gothic Neo, sans-serif" font-size="18" text-anchor="middle" font-weight="800" fill="#fff">3</text>
<text x="655" y="218" font-family="Pretendard, Apple SD Gothic Neo, sans-serif" font-size="22" font-weight="800" fill="#111827">호스트 판단</text>
<path d="M 798 212 L 812 212" stroke="#9CAF88" stroke-width="5" stroke-linecap="round"/>
<path d="M 798 200 L 812 212 L 798 224" fill="none" stroke="#9CAF88" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
<rect x="840" y="168" width="190" height="88" rx="22" fill="#F8EFE7" stroke="#D8C7AF"/>
<circle cx="874" cy="212" r="18" fill="#4F6F5A"/><text x="874" y="219" font-family="Pretendard, Apple SD Gothic Neo, sans-serif" font-size="18" text-anchor="middle" font-weight="800" fill="#fff">4</text>
<text x="905" y="218" font-family="Pretendard, Apple SD Gothic Neo, sans-serif" font-size="22" font-weight="800" fill="#111827">승인된 세션</text>
<text x="70" y="340" font-family="Pretendard, Apple SD Gothic Neo, sans-serif" font-size="15" fill="#6B7280">PonsLink 제품 글을 위한 본문 다이어그램</text></svg>