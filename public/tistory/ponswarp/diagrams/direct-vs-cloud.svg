<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 520" role="img" aria-labelledby="title desc">
<title id="title">Direct transfer and Cloud Drop paths</title>
<desc id="desc">PonsWarp separates live peer-to-peer transfer from delayed cloud drop sharing.</desc>
<rect width="1200" height="520" rx="32" fill="#fbf7ef"/>
<g fill="none" stroke="#2f2a25" stroke-width="4" stroke-linecap="round" stroke-linejoin="round">
  <rect x="90" y="120" width="170" height="110" rx="18" fill="#fffaf2"/>
  <rect x="940" y="120" width="170" height="110" rx="18" fill="#fffaf2"/>
  <path d="M270 175 C420 90 780 90 930 175" stroke="#0f9ca8" stroke-width="8"/>
  <path d="M285 335 H480 Q525 335 525 290 V260" stroke="#c76d3a" stroke-width="8"/>
  <path d="M675 260 V290 Q675 335 720 335 H915" stroke="#c76d3a" stroke-width="8"/>
  <rect x="500" y="205" width="200" height="110" rx="24" fill="#f4dfcf"/>
  <path d="M560 205 v-28 q0-40 40-40 q40 0 40 40 v28"/>
</g>
<g font-family="ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI" fill="#2f2a25">
  <text x="175" y="180" text-anchor="middle" font-size="28" font-weight="700">Sender</text>
  <text x="1025" y="180" text-anchor="middle" font-size="28" font-weight="700">Receiver</text>
  <text x="600" y="180" text-anchor="middle" font-size="30" font-weight="800" fill="#0f9ca8">Direct</text>
  <text x="600" y="365" text-anchor="middle" font-size="30" font-weight="800" fill="#9c4f24">Cloud Drop</text>
  <text x="600" y="268" text-anchor="middle" font-size="24" font-weight="700">temporary vault</text>
</g>
</svg>
