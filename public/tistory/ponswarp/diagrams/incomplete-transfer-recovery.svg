<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1120 520" role="img" aria-labelledby="title desc">
  <title id="title">끊긴 전송을 처리하는 기준</title>
  <desc id="desc">PonsWarp article diagram</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#0f172a"/><stop offset="1" stop-color="#164e63"/></linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%"><feDropShadow dx="0" dy="14" stdDeviation="16" flood-color="#020617" flood-opacity="0.22"/></filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M2 2 L10 6 L2 10 Z" fill="#38bdf8"/></marker>
  </defs>
  <rect width="1120" height="520" rx="38" fill="url(#bg)"/>
  <text x="70" y="72" font-family="Inter, Pretendard, system-ui, sans-serif" font-size="30" font-weight="800" fill="#f8fafc">끊긴 전송을 처리하는 기준</text>
  <text x="72" y="108" font-family="Inter, Pretendard, system-ui, sans-serif" font-size="15" fill="#cbd5e1">PonsWarp design note</text>
  <g filter="url(#shadow)">
      <rect x="80" y="180" width="210" height="130" rx="26" fill="#f8fafc" opacity="0.96"/>
      <circle cx="122" cy="224" r="21" fill="#38bdf8" opacity="0.9"/>
      <text x="122" y="231" text-anchor="middle" font-family="Inter, Pretendard, system-ui, sans-serif" font-size="20" font-weight="800" fill="#0f172a">1</text>
      <text x="110" y="270" font-family="Inter, Pretendard, system-ui, sans-serif" font-size="21" font-weight="800" fill="#0f172a">조각 수신</text>
    </g>
  <path d="M 304 245 C 324 225, 308 265, 328 245" stroke="#38bdf8" stroke-width="5" fill="none" marker-end="url(#arrow)" opacity="0.95"/>
  <g filter="url(#shadow)">
      <rect x="342" y="180" width="210" height="130" rx="26" fill="#f8fafc" opacity="0.96"/>
      <circle cx="384" cy="224" r="21" fill="#38bdf8" opacity="0.9"/>
      <text x="384" y="231" text-anchor="middle" font-family="Inter, Pretendard, system-ui, sans-serif" font-size="20" font-weight="800" fill="#0f172a">2</text>
      <text x="372" y="270" font-family="Inter, Pretendard, system-ui, sans-serif" font-size="21" font-weight="800" fill="#0f172a">검증 전 버퍼</text>
    </g>
  <path d="M 566 245 C 586 225, 570 265, 590 245" stroke="#38bdf8" stroke-width="5" fill="none" marker-end="url(#arrow)" opacity="0.95"/>
  <g filter="url(#shadow)">
      <rect x="604" y="180" width="210" height="130" rx="26" fill="#f8fafc" opacity="0.96"/>
      <circle cx="646" cy="224" r="21" fill="#38bdf8" opacity="0.9"/>
      <text x="646" y="231" text-anchor="middle" font-family="Inter, Pretendard, system-ui, sans-serif" font-size="20" font-weight="800" fill="#0f172a">3</text>
      <text x="634" y="270" font-family="Inter, Pretendard, system-ui, sans-serif" font-size="21" font-weight="800" fill="#0f172a">완료 신호</text>
    </g>
  <path d="M 828 245 C 848 225, 832 265, 852 245" stroke="#38bdf8" stroke-width="5" fill="none" marker-end="url(#arrow)" opacity="0.95"/>
  <g filter="url(#shadow)">
      <rect x="866" y="180" width="210" height="130" rx="26" fill="#f8fafc" opacity="0.96"/>
      <circle cx="908" cy="224" r="21" fill="#38bdf8" opacity="0.9"/>
      <text x="908" y="231" text-anchor="middle" font-family="Inter, Pretendard, system-ui, sans-serif" font-size="20" font-weight="800" fill="#0f172a">4</text>
      <text x="896" y="270" font-family="Inter, Pretendard, system-ui, sans-serif" font-size="21" font-weight="800" fill="#0f172a">원자적 저장</text>
    </g>
  <g font-family="Inter, Pretendard, system-ui, sans-serif" font-size="18" fill="#e2e8f0">
    <text x="92" y="385">• 중간 파일은 결과가 아니다</text>
    <text x="92" y="421">• 실패는 삭제 가능한 상태로 둔다</text>
    <text x="92" y="457">• 완료된 파일만 사용자에게 보인다</text>
  </g>
</svg>
