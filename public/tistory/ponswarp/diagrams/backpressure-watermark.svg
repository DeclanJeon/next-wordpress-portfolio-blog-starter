<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 520" role="img" aria-labelledby="title desc">
<title id="title">Backpressure high and low watermark</title>
<desc id="desc">The sender pauses when receiver buffers are high and resumes when they drain below a safer threshold.</desc>
<rect width="1200" height="520" rx="32" fill="#fbf7ef"/>
<g font-family="ui-sans-serif, system-ui" fill="#2f2a25">
  <text x="160" y="92" text-anchor="middle" font-size="30" font-weight="800">Sender</text>
  <text x="600" y="92" text-anchor="middle" font-size="30" font-weight="800">DataChannel</text>
  <text x="1010" y="92" text-anchor="middle" font-size="30" font-weight="800">Receiver buffer</text>
</g>
<g fill="none" stroke-linecap="round" stroke-linejoin="round">
  <rect x="80" y="145" width="160" height="110" rx="18" fill="#fffaf2" stroke="#2f2a25" stroke-width="4"/>
  <path d="M265 200 H780" stroke="#0f9ca8" stroke-width="10"/>
  <path d="M520 170 v60" stroke="#c76d3a" stroke-width="12"/>
  <rect x="820" y="125" width="270" height="270" rx="24" fill="#fffaf2" stroke="#2f2a25" stroke-width="4"/>
  <path d="M850 315 H1060" stroke="#9c4f24" stroke-width="5"/>
  <path d="M850 245 H1060" stroke="#168a51" stroke-width="5"/>
  <rect x="850" y="245" width="210" height="95" rx="10" fill="#8bd3dd" opacity="0.75"/>
</g>
<g font-family="ui-sans-serif, system-ui" font-size="24" font-weight="700">
  <text x="520" y="275" text-anchor="middle" fill="#9c4f24">pause valve</text>
  <text x="1090" y="250" fill="#168a51">low</text>
  <text x="1090" y="320" fill="#9c4f24">high</text>
</g>
</svg>
