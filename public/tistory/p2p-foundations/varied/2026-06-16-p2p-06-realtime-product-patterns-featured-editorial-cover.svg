<text x="150" y="285" font-size="54" font-weight="800" fill="#2f2720" font-family="sans-serif">실시간 제품은 상태 머신, 역압, 멱등성으로 버틴다</text><text x="150" y="350" font-size="26" fill="#8a725a" font-family="sans-serif">Pattern Language</text><rect x="150" y="410" width="1100" height="86" rx="26" fill="#eef4ef" stroke="#9bb69f"/><text x="700" y="462" text-anchor="middle" font-size="25" fill="#2f2720" font-family="sans-serif">실시간 제품은 빠르게 보내는 능력보다 상태를 제한하고, 받을 수 있을 만큼만 흐르게 하고, 중복을</text><rect x="150" y="570" width="190" height="52" rx="20" fill="#fff8ed" stroke="#d7b98b"/><text x="245" y="603" text-anchor="middle" font-size="20" fill="#2f2720" font-family="sans-serif">상태 머신</text><rect x="380" y="570" width="190" height="52" rx="20" fill="#fff8ed" stroke="#d7b98b"/><text x="475" y="603" text-anchor="middle" font-size="20" fill="#2f2720" font-family="sans-serif">역압</text><rect x="610" y="570" width="190" height="52" rx="20" fill="#fff8ed" stroke="#d7b98b"/><text x="705" y="603" text-anchor="middle" font-size="20" fill="#2f2720" font-family="sans-serif">멱등성</text><rect x="840" y="570" width="190" height="52" rx="20" fill="#fff8ed" stroke="#d7b98b"/><text x="935" y="603" text-anchor="middle" font-size="20" fill="#2f2720" font-family="sans-serif">Pub/Sub</text><rect x="1070" y="570" width="190" height="52" rx="20" fill="#fff8ed" stroke="#d7b98b"/><text x="1165" y="603" text-anchor="middle" font-size="20" fill="#2f2720" font-family="sans-serif">재시도</text><text x="700" y="700" text-anchor="middle" font-size="18" fill="#8a725a" font-family="monospace">T07 · I09 · I05 · I07 · I03</text>
