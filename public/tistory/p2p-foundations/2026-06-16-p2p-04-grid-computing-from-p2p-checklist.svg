<text x="92" y="158" font-size="16" fill="#8a725a" font-family="monospace">CHECKLIST · PonsLink visual note</text>
<rect x="130" y="235" width="1140" height="96" rx="20" fill="#fbf8f1" stroke="#c8b697"/><text x="180" y="293" font-size="25" fill="#3c3128" font-family="sans-serif">1. 작업 조각은 얼마나 커야 네트워크 비용보다 계산 이득이 큰가</text>
<rect x="130" y="370" width="1140" height="96" rx="20" fill="#fbf8f1" stroke="#c8b697"/><text x="180" y="428" font-size="25" fill="#3c3128" font-family="sans-serif">2. 워커가 떠나면 어떤 조각을 누가 이어받는가</text>
<rect x="130" y="505" width="1140" height="96" rx="20" fill="#fbf8f1" stroke="#c8b697"/><text x="180" y="563" font-size="25" fill="#3c3128" font-family="sans-serif">3. 결과 검증은 샘플링인가 중복 계산인가 결정적 검증인가</text>
